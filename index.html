<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Twende Tours</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="auth-container">
        <!-- Login Form -->
        <div id="loginForm" class="auth-form">
            <div class="auth-header">
                <div class="logo">
                    <i data-lucide="compass"></i>
                </div>
                <h1>Welcome Back</h1>
                <p>Sign in to your safari dashboard</p>
            </div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary">
                    <i data-lucide="log-in"></i> Sign In
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="#" onclick="showRegister()">Sign up</a></p>
            </div>
        </div>

        <!-- Registration Form -->
        <div id="registerForm" class="auth-form hidden">
            <div class="auth-header">
                <div class="logo">
                    <i data-lucide="compass"></i>
                </div>
                <h1>Join Twende</h1>
                <p>Create your account to get started</p>
            </div>

            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" required placeholder="Your full name">
                </div>

                <div class="form-group">
                    <label>Account Type</label>
                    <div class="account-types">
                        <label class="account-type-card active" onclick="selectAccountType('client')">
                            <input type="radio" name="accountType" value="client" checked>
                            <div class="card-content">
                                <strong>Explorer</strong>
                                <span>Book safaris & view fleet</span>
                            </div>
                        </label>
                        <label class="account-type-card" onclick="selectAccountType('staff')">
                            <input type="radio" name="accountType" value="staff">
                            <div class="card-content">
                                <strong>Operations</strong>
                                <span>Manage fleet & bookings</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label>Phone (Optional)</label>
                    <input type="tel" id="regPhone" placeholder="+254 700 000 000">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" required placeholder="••••••••" minlength="6">
                </div>

                <button type="submit" class="btn-primary">
                    <i data-lucide="user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="#" onclick="showLogin()">Sign in</a></p>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
