<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | Twende Tours</title>
    <link rel="stylesheet" href="client.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="client-header">
        <div class="logo">
            <i data-lucide="compass"></i>
            <span>Twende Tours</span>
        </div>
        <nav class="client-nav">
            <a href="#" class="nav-link active" onclick="showSection('dashboard')">Dashboard</a>
            <a href="#" class="nav-link" onclick="showSection('bookings')">My Bookings</a>
            <a href="#" class="nav-link" onclick="handleLogout()">Logout</a>
        </nav>
    </header>

    <main class="client-main">
        <!-- Dashboard Section -->
        <section id="dashboard" class="section">
            <h1 id="welcomeMessage">Welcome!</h1>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalTrips">0</div>
                    <div class="stat-label">Total Trips</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="upcomingTrips">0</div>
                    <div class="stat-label">Upcoming</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalSpent">$0</div>
                    <div class="stat-label">Total Spent</div>
                </div>
            </div>

            <button class="btn-primary" onclick="openBookingModal()">
                <i data-lucide="plus"></i> Book New Safari
            </button>
        </section>

        <!-- Bookings Section -->
        <section id="bookings" class="section hidden">
            <h1>My Bookings</h1>
            <div id="bookingsList" class="bookings-list"></div>
        </section>
    </main>

    <!-- Booking Modal -->
    <div id="bookingModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Book New Safari</h2>
                <button onclick="closeBookingModal()">&times;</button>
            </div>
            <form id="bookingForm">
                <div class="form-group">
                    <label>Vehicle</label>
                    <select id="vehicleId" required></select>
                </div>
                <div class="form-group">
                    <label>Destination</label>
                    <input type="text" id="destination" required>
                </div>
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" id="startDate" required>
                </div>
                <div class="form-group">
                    <label>Travelers</label>
                    <input type="number" id="travelers" min="1" required>
                </div>
                <button type="submit" class="btn-primary">Submit Booking</button>
            </form>
        </div>
    </div>

    <script src="client.js"></script>
</body>
</html>
